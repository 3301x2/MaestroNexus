<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3366;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3366;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3366;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  
  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  
  <!-- Ambient glow orb behind the icon -->
  <circle cx="256" cy="240" r="120" fill="url(#orbGrad)" filter="url(#softGlow)"/>
  
  <!-- The "M" shape formed by a continuous pulse/heartbeat line -->
  <!-- This creates an M shape that looks like a heartbeat monitor -->
  <g filter="url(#glow)">
    <!-- Main pulse line forming stylized M -->
    <path 
      d="M 100 320 
         L 140 320 
         L 170 200 
         L 200 360 
         L 240 120 
         L 256 260
         L 272 120
         L 312 360
         L 342 200
         L 372 320
         L 412 320"
      fill="none" 
      stroke="url(#pulseGrad)" 
      stroke-width="18" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
  </g>
  
  <!-- Small dot accents at the peaks -->
  <circle cx="240" cy="120" r="6" fill="#ff3366" filter="url(#glow)" opacity="0.8"/>
  <circle cx="272" cy="120" r="6" fill="#ff3366" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Thin horizontal baseline pulse extending left and right -->
  <line x1="60" y1="320" x2="100" y2="320" stroke="#ff3366" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="412" y1="320" x2="452" y2="320" stroke="#ff3366" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Subtle "MAESTRO" text below -->
  <text x="256" y="420" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" letter-spacing="8" fill="#ffffff" opacity="0.5">MAESTRONEXUS</text>
</svg>